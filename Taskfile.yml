# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  SCRIPT_DIR: '{{.TASKFILE_DIR}}/scripts'

tasks:
  default:
    desc: "List all available workspace automation commands"
    cmds:
      - go-task --list

  gen-template:
    desc: "Generate a new Maven project structure"
    dir: '{{.ROOT_DIR}}/Projects'
    cmds:
      - chmod +x "{{.SCRIPT_DIR}}/maven_template_generate.sh"
      - '"{{.SCRIPT_DIR}}/maven_template_generate.sh" {{.CLI_ARGS}}'
  pushj:
    desc: pushj stands for PushJournal, we can push our journal easily via this I suppose
    dir: '{{.ROOT_DIR}}/'
    cmds:
      - git status # for no reason
      - git add JOURNAL.md
      - |
        printf "Enter your reflection message alone: ";
        read -r message;
        git commit -m "journal: ${message} [$(date +'%Y-%m-%d • %H:%M')]"
  self-push:
    desc: well, whenever I update the Taskfile.yml i will be running this to commit, idk i am loving this 💕
    dir: '{{.ROOT_DIR}}'
    cmds:
      - git status
      - git add Taskfile.yml
      - |
        ls -alh
        git commit -m "chore: Updated the Taskfile.yml. Refer inside the commit for more info. [$(date +'%Y-%m-%d • %H:%M')]"
  copy-solution:
    desc: "Copy pom.xml + java files from current project into solutions/weekXX/dayYY-name, then commit"
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - chmod +x "{{.SCRIPT_DIR}}/copy_solution.sh"
      - '"{{.SCRIPT_DIR}}/copy_solution.sh" "{{.ROOT_DIR}}/solutions"'
      - task: commit-solutions

  commit-solutions:
    internal: true
    dir: '{{.ROOT_DIR}}'
    cmds:
      - git add solutions/
      - |
        if git diff --cached --quiet; then
          echo "Nothing new to commit."
        else
          git commit -m "log: add solution copy $(date +'%Y-%m-%d %H:%M')"
        fi

  capture:
    desc: "Run a class, screenshot output, copy the solution, and commit both"
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - chmod +x "{{.SCRIPT_DIR}}/output_capture.sh" "{{.SCRIPT_DIR}}/copy_solution.sh"
      - '"{{.SCRIPT_DIR}}/output_capture.sh" "{{.ROOT_DIR}}/Outputs" "{{.ROOT_DIR}}/solutions" "{{.SCRIPT_DIR}}"'
  # ---------------------------------------------------------------------------
  # Lazy & Smart Dev Loop Commands
  # ---------------------------------------------------------------------------

  compile:
    desc: "Intelligently compile the project in your current terminal folder"
    cmds:
      - mvn -f "{{.USER_WORKING_DIR}}/pom.xml" compile

  build:
    desc: "Package the project in your current terminal folder into a JAR"
    cmds:
      - mvn -f "{{.USER_WORKING_DIR}}/pom.xml" clean package

  test:
    desc: "Run JUnit tests for the project in your current terminal folder"
    cmds:
      - mvn -f "{{.USER_WORKING_DIR}}/pom.xml" test

  run:
    desc: "Run a class in your current terminal folder (e.g., task run -- com.dn5.App)"
    cmds:
      - |
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "Error: You must specify the main class name."
          echo "Usage: task run -- com.dn5.App"
          exit 1
        fi
        mvn -f "{{.USER_WORKING_DIR}}/pom.xml" exec:java -Dexec.mainClass="{{.CLI_ARGS}}"